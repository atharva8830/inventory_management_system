{% extends 'base.html' %}



{% block lion %}

    <div class="jumbotron" align = "center">
        <h1>Here are the suppliers</h1>
        <table class="table" align = "center">
        <thead class="thead-dark">
            <tr>
                <th>id</th>
                <th>name</th>
                <th>email</th>
                <th>phone</th>
                <th>address</th>
                <th>action </th>
              
            </tr>
            </thead>
            <tbody>
                {% for item in data %}
                    <tr>
                    <td>{{item.id}}</td>
                    <td> {{item.name}}</td>
                    <td>{{item.email}}</td>
                    <td>{{item.phone}}</td>
                    <td>{{item.address}}</td>
                   <td><a href="{% url 'del_sup' item.id %}" class="btn btn-danger">Delete</a>
                   <a href="{% url 'update_sup' item.id %}" class="btn btn-primary">Upadte</a></td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>  
        <div>
                        <a href="/add_sup/" class="btn btn-success"> add supplier </a>
                    </div>     
    </div>

{% endblock lion %}
